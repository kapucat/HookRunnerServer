services:
  postgres_loadtest:
    image: postgres:16
    container_name: hook_runner_postgres_loadtest
    environment:
      POSTGRES_USER: hook_user
      POSTGRES_PASSWORD: hook_password
      POSTGRES_DB: hook_runner_loadtest_db
    volumes:
      - postgres_loadtest_data:/var/lib/postgresql/data
      - ./loadtest/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hook_user -d hook_runner_loadtest_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api_loadtest:
    build: .
    container_name: hook_runner_api_loadtest
    depends_on:
      postgres_loadtest:
        condition: service_healthy
    environment:
      DB_HOST: postgres_loadtest
      DB_PORT: 5432
      DB_USER: hook_user
      DB_PASSWORD: hook_password
      DB_NAME: hook_runner_loadtest_db
    ports:
      - "8081:8080"

volumes:
  postgres_loadtest_data: